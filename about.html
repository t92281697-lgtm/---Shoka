<h1>書架（shoka）について</h1>

<p>
書架（shoka）は、本棚を眺めるような感覚で読書記録を管理できる無料サービスです。
</p>

<p>
読了した本、読書中の本、積読を分かりやすく整理し、自分だけの本棚を作ることができます。
</p>

<p>
シリーズ管理、評価、読書進捗などを記録し、本好きのためのシンプルで使いやすい読書ログを目指しています。
</p>

<p>
今後も便利な機能を追加していく予定です。
</p>
